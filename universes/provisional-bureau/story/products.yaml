# The Provisional Bureau — service catalog (services as Odoo products).
# Schema: see ARCHITECTURE.md.
# Prices in EUR. Cost prices approximate, for demo realism.

# ─── Strategy engagements ──────────────────────────────────────
- id: brand-strategy-sprint
  name: Brand Strategy Sprint
  line: Strategy
  category: strategy
  uom: Service
  sale_price: 45000
  cost_price: 18000
  description: |
    Four-week brand strategy engagement. Discovery research, stakeholder
    interviews, positioning development, narrative framework, and a
    leadership-ready strategy deck. Fixed fee.

- id: naming-sprint
  name: Naming Sprint
  line: Strategy
  category: strategy
  uom: Service
  sale_price: 28000
  cost_price: 10000
  description: |
    Three-week naming engagement. Linguistic territory mapping, name
    generation, shortlist evaluation (linguistic + trademark + URL),
    final recommendation. Trademark search billed separately.

- id: positioning-workshop-day
  name: Positioning Workshop (single day)
  line: Strategy
  category: strategy
  uom: Days
  sale_price: 7500
  cost_price: 2200
  description: |
    Single-day on-site or virtual workshop for client leadership.
    Two senior strategists facilitating. Outputs: positioning canvas,
    next-step recommendations.

- id: annual-brand-audit
  name: Annual Brand Audit
  line: Strategy
  category: strategy
  uom: Service
  sale_price: 18000
  cost_price: 6000
  description: |
    Annual cross-channel brand audit for stewardship clients. Identity
    consistency, voice consistency, customer-touchpoint review, drift
    register, recommendations report.

